spring:
  application:
    name: coworking-management
  main:
    banner-mode: off
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: America/El_Salvador
  jackson:
    time-zone: America/El_Salvador

  profiles:
    default: dev

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
    com.company: DEBUG