spring:
  application:
    name: coworking-management
  main:
    banner-mode: off
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: America/El_Salvador
  jackson:
    time-zone: America/El_Salvador
  profiles:
    default: dev

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
    com.company: DEBUG

security:
  jwt:
    secret: 1c9a14f7c25e69c73f0ab4d7bc5ab83b0b1cb4fcb5eb8d08f9e4f98bbd9c0d6b
    expiration: 86400000