spring:
  application:
    name: coworking-management
  profiles:
    default: ${SPRING_PROFILES_ACTIVE}
  main:
    banner-mode: off
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: America/El_Salvador
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jackson:
    time-zone: America/El_Salvador
  cache:
    type: simple


server:
  servlet:
    context-path: /coworking-api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    org.springframework.web: INFO
    org.flywaydb: INFO
    com.company: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 5s
        waitDurationInOpenState: 2s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      paymentService:
        baseConfig: default
  retry:
    instances:
      paymentService:
        maxAttempts: 3
        waitDuration: 1s

security:
  jwt:
    secret: grCmBC3sfP46z6LpI2UZsGJXMFiX9XzOIbIUIhktmBMRYHpYuoaXrI4LTMspBFFn
    expiration: 86400000

integration:
  payment-gateway:
    url: ${PAYMENT_GATEWAY_URL}