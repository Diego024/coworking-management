services:
  postgres:
    image: postgres:16-alpine
    container_name: coworking-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: coworking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d coworking" ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - coworking-network

  wiremock:
    image: wiremock/wiremock:3.9.1
    container_name: coworking-wiremock
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
    command: --global-response-templating

volumes:
  postgres-data:

networks:
  coworking-network:
    driver: bridge